name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: build backend image
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: build backend docker image
        run: |
          docker build \
            -t fullstack-backend:${{ github.sha }} \
            ./projects/fullstack-app/backend

  build-frontend:
    name: build frontend image
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install dependencies
        working-directory: ./projects/fullstack-app/frontend
        run: npm ci

      - name: build react app
        working-directory: ./projects/fullstack-app/frontend
        run: npm run build
        env:
          CI: false

      - name: build frontend docker image
        run: |
          docker build \
            -t fullstack-frontend:${{ github.sha }} \
            ./projects/fullstack-app/frontend

  smoke-test:
    name: smoke test with compose
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install frontend dependencies and build
        working-directory: ./projects/fullstack-app/frontend
        run: |
          npm ci
          npm run build
        env:
          CI: false

      - name: start services
        working-directory: ./projects/fullstack-app
        run: docker compose up -d --build

      - name: wait for services to be ready
        run: sleep 10

      - name: check frontend is responding
        run: curl -f http://localhost:3000

      - name: show logs if anything failed
        if: failure()
        working-directory: ./projects/fullstack-app
        run: docker compose logs

      - name: stop services
        if: always()
        working-directory: ./projects/fullstack-app
        run: docker compose down
